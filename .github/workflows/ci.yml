name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workspace:
    name: Workspace (${{ matrix.os }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runs_on: ubuntu-latest
            container_image: fedora:43
          - os: macos
            runs_on: macos-latest
    container: ${{ matrix.container_image || null }}
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Install git (Linux)
        if: matrix.os == 'linux'
        run: dnf install -y --setopt=install_weak_deps=False git

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install native dependencies
        if: matrix.os == 'linux'
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            curl \
            gcc \
            gcc-c++ \
            gtk4-devel \
            libadwaita-devel \
            pkgconf-pkg-config \
            vte291-gtk4-devel

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check workspace
        run: cargo check --workspace

      - name: Test workspace
        run: cargo test --workspace

      - name: Build package
        if: matrix.os == 'macos'
        run: ./scripts/package-macos.sh

      - name: Verify package structure
        if: matrix.os == 'macos'
        run: |
          test -d target/package/Exaterm.app/Contents/MacOS
          test -f target/package/Exaterm.app/Contents/Info.plist
          test -x target/package/Exaterm.app/Contents/MacOS/exaterm
          test -f target/package/Exaterm.app/Contents/PkgInfo
          plutil -lint target/package/Exaterm.app/Contents/Info.plist

      - name: Upload package
        if: matrix.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: Exaterm.app
          path: target/package/Exaterm.app
