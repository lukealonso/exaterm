name: Web E2E

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  schedule:
    - cron: "0 4 * * *"

concurrency:
  group: web-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect web E2E changes
    runs-on: ubuntu-latest
    outputs:
      web_e2e: ${{ steps.set.outputs.web_e2e }}
    steps:
      - name: Check out repository
        if: github.event_name != 'schedule'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: filter
        if: github.event_name != 'schedule'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web_e2e:
              - .github/workflows/web-e2e.yml
              - Cargo.toml
              - Cargo.lock
              - crates/exaterm-core/**
              - crates/exaterm-types/**
              - crates/exaterm-web/**

      - name: Set decision
        id: set
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "web_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "web_e2e=${{ steps.filter.outputs.web_e2e }}" >> "$GITHUB_OUTPUT"
          fi

  playwright:
    name: Playwright (Linux)
    needs: changes
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Skip when no relevant files changed
        if: needs.changes.outputs.web_e2e != 'true'
        run: echo "No exaterm-web, exaterm-core, or exaterm-types changes; skipping Playwright."

      - name: Check out repository
        if: needs.changes.outputs.web_e2e == 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: needs.changes.outputs.web_e2e == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            crates/exaterm-web/package-lock.json
            crates/exaterm-web/frontend/package-lock.json

      - name: Install Rust toolchain
        if: needs.changes.outputs.web_e2e == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        if: needs.changes.outputs.web_e2e == 'true'
        working-directory: crates/exaterm-web/frontend
        run: npm ci

      - name: Build exaterm-web
        if: needs.changes.outputs.web_e2e == 'true'
        run: cargo build --locked -p exaterm-web

      - name: Install Playwright dependencies
        if: needs.changes.outputs.web_e2e == 'true'
        working-directory: crates/exaterm-web
        run: npm ci

      - name: Install Playwright browser
        if: needs.changes.outputs.web_e2e == 'true'
        working-directory: crates/exaterm-web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright suite
        if: needs.changes.outputs.web_e2e == 'true'
        working-directory: crates/exaterm-web
        run: npm run test:e2e:ci

      - name: Upload Playwright report
        if: failure() && needs.changes.outputs.web_e2e == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            crates/exaterm-web/playwright-report
            crates/exaterm-web/test-results
          if-no-files-found: ignore
